<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annamitra - Search Food</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { font-family:'Segoe UI', sans-serif; margin:0; padding:20px; }
    #map { height:400px; margin-top:15px; border-radius:10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Search Food</h2>
    <form id="searchForm">
      <input type="text" name="item" class="form-control" placeholder="Food name" required>
      <button type="submit" class="btn btn-primary mt-2">Search</button>
    </form>
    <div id="results" class="mt-3"></div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    let map = L.map("map").setView([12.91, 74.85], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution:"© OpenStreetMap contributors" }).addTo(map);

    document.getElementById("searchForm").addEventListener("submit", async function(e){
      e.preventDefault();
      const item = this.item.value;
      navigator.geolocation.getCurrentPosition(async pos => {
        const res = await fetch(`/search?item=${item}&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
        const data = await res.json();
        let html = "";
        map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
        if(data.length === 0) html = `<div class="alert alert-warning">No donations nearby</div>`;
        else {
          data.forEach(d => {
            html += `<div><b>${d.food_name}</b> (${d.food_type}) | Qty: ${d.quantity} | Donor: ${d.donor_name} | ${d.location} | Distance: ${d.distance_km || "N/A"} km</div>`;
            if(d.lat && d.lon){
              L.marker([d.lat,d.lon]).addTo(map).bindPopup(`<b>${d.food_name}</b><br>Qty:${d.quantity}<br>${d.location}`);
            }
          });
        }
        document.getElementById("results").innerHTML = html;
      });
    });
  </script>
</body>
</html>
