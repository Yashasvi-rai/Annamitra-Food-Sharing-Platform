<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annamitra - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family:'Segoe UI', sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#f5f5f5; }
    .container { background:white; padding:30px; border-radius:12px; width:100%; max-width:400px; }
    .btn-custom { width:100%; margin-top:10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mb-4">Login</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" name="email" required>
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-custom">Login</button>
    </form>
    <div id="loginResult" class="mt-3"></div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e){
      e.preventDefault();
      const formData = new FormData(this);
      const res = await fetch("/login", { method:"POST", body:formData });
      const data = await res.json();
      if(data.success){
        window.location.href = "/dashboard";
      } else {
        document.getElementById("loginResult").innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
      }
    });
  </script>
</body>
</html>
