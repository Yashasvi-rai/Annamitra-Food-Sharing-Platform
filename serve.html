<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annamitra - Serve Food</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; background: #f8f9fa; }
    .container { max-width: 600px; margin-top: 50px; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 12px; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="mb-4">Serve Food</h2>
  <form id="serveForm" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Donor Name</label>
      <input type="text" name="donor_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Quantity</label>
      <input type="number" name="quantity" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Food Image</label>
      <input type="file" name="file" class="form-control" accept="image/*" required>
    </div>
    <button type="submit" class="btn btn-success">Submit</button>
  </form>

  <div id="serveMsg" class="mt-3"></div>
</div>

<script>
document.getElementById("serveForm").addEventListener("submit", function(e){
    e.preventDefault();

    const formData = new FormData(this);
    const resultDiv = document.getElementById("serveResult");
    resultDiv.innerHTML = "⏳ Predicting food...";

    navigator.geolocation.getCurrentPosition(pos => {
        formData.append("lat", pos.coords.latitude);
        formData.append("lon", pos.coords.longitude);

        fetch("/serve_food", { method: "POST", body: formData })
        .then(res => res.json())
        .then(data => {
  document.getElementById("serveMsg").innerHTML =
    `<div class="alert alert-success">
       ✅ Food: ${data.food_name} (${data.food_type})<br>
       Qty: ${data.quantity} | Donor: ${data.donor_name}<br>
       Location: ${data.location}
     </div>`;
});


</script>


</body>
</html>
